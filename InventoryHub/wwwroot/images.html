<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Subir imágenes de producto</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-10">

    <h1 class="text-3xl font-bold mb-6">Subir imágenes de producto</h1>

    <div class="bg-white p-6 rounded shadow w-96">

        <label class="block mb-2 font-semibold">Product ID</label>
        <input id="productId"
               type="number"
               value="1"
               class="border p-2 w-full mb-4 rounded">

        <label class="block mb-2 font-semibold">Seleccionar imágenes</label>
        <input id="files"
               type="file"
               multiple
               class="border p-2 w-full mb-4 rounded">

        <button onclick="uploadImages()"
                class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
            Subir imágenes
        </button>

        <div id="result" class="mt-4 text-sm"></div>

        <div id="preview" class="mt-4 grid grid-cols-2 gap-2"></div>

    </div>

    <script>

        async function uploadImages() {

            const productId = document.getElementById("productId").value;
            const fileInput = document.getElementById("files");
            const result = document.getElementById("result");
            const preview = document.getElementById("preview");

            result.innerHTML = "";
            preview.innerHTML = "";

            if (!productId || fileInput.files.length === 0) {
                result.innerHTML = "Selecciona un Product ID y al menos una imagen";
                return;
            }

            const formData = new FormData();

            for (let file of fileInput.files) {
                formData.append("files", file);
            }

            try {

                const response = await fetch(`https://localhost:7266/api/products/${productId}/images`, {
                    method: "POST",
                    body: formData
                });

                if (!response.ok) {
                    const text = await response.text();
                    throw new Error(text || "Error al subir imágenes");
                }

                const images = await response.json();

                result.innerHTML = `<b>Imágenes subidas:</b> (${images.length})`;

                images.forEach(imgData => {

                    const container = document.createElement("div");
                    container.className = "relative";

                    const img = document.createElement("img");
                    img.src = imgData.url;
                    img.className = "w-full h-32 object-cover rounded border";

                    container.appendChild(img);

                    if (imgData.isMain) {
                        const badge = document.createElement("span");
                        badge.innerText = "Principal";
                        badge.className = "absolute top-1 left-1 bg-green-500 text-white text-xs px-2 py-1 rounded";
                        container.appendChild(badge);
                    }

                    preview.appendChild(container);

                });

            }
            catch (error) {

                result.innerHTML = "Error: " + error.message;

            }

        }

    </script>

</body>
</html>
